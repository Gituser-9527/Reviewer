services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: job_compliance_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d job_compliance_agent']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      target: api
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3001
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/job_compliance_agent
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run db:migrate && npm run start --workspace @job-compliance/api"
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3001/health/ready || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      target: web
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_BASE_URL: http://api:3001
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres-data:
